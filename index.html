<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤝 우리동네 구인구직</title>
  <!-- 기존 스타일 유지를 위한 테일윈드/프리텐다드 기본 세팅 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 메인 헤더 상단바 -->
  <header class="bg-orange-500 text-white shadow-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2 cursor-pointer" onclick="location.reload()">
        🤝 우리동네 구인구직
      </h1>
      <div class="flex gap-4 text-sm font-medium">
        <a href="#searchSection" class="hover:underline">일자리 찾기</a>
        <a href="#formSection" class="hover:underline text-orange-100">구인공고 등록</a>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">

    <!-- [기능 1] 일자리 찾기 및 검색/필터 제어 구역 -->
    <section id="searchSection" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
      <h2 class="text-lg font-bold text-gray-800">🔍 우리 동네 일자리 찾기</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <!-- 동네 검색 -->
        <input type="text" id="searchDong" oninput="filterJobs()" placeholder="동네 이름으로 검색 (예: 역삼동)" 
               class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm">
        
        <!-- 업종 선택 필터 -->
        <select id="filterCategory" onchange="filterJobs()" 
                class="w-full px-4 py-2 border border-gray-200 rounded-xl bg-white focus:outline-none focus:border-orange-500 text-sm">
          <option value="전체">모든 업종 보기</option>
          <option value="식당/카페">식당/카페</option>
          <option value="편의점/마트">편의점/마트</option>
          <option value="서빙/주방">서빙/주방</option>
          <option value="사무/기타">사무/기타</option>
        </select>

        <!-- 정렬 기준 -->
        <select id="sortPay" onchange="filterJobs()" 
                class="w-full px-4 py-2 border border-gray-200 rounded-xl bg-white focus:outline-none focus:border-orange-500 text-sm">
          <option value="latest">최신 등록순</option>
          <option value="highPay">시급 높은순</option>
        </select>
      </div>
    </section>

    <!-- [기능 2] 일자리 목록 출력판 (메인 보드) -->
    <section class="space-y-4">
      <div class="flex justify-between items-center">
        <h3 class="text-base font-bold text-gray-700 flex items-center gap-2">
          📋 총 <span id="jobCount" class="text-orange-500">0</span>개의 일자리가 있습니다.
        </h3>
        <button onclick="loadJobs()" class="text-xs text-gray-500 hover:text-orange-500 cursor-pointer">
          🔄 실시간 새로고침
        </button>
      </div>

      <!-- 데이터 로딩 인디케이터 -->
      <div id="loadingText" class="text-center py-12 text-gray-400 font-medium">실시간 구인 데이터를 동기화하고 있습니다...</div>
      
      <!-- 실제 카드들이 꽂히는 구역 -->
      <div id="jobList" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden"></div>
    </section>

    <hr class="border-gray-200 my-8">

    <!-- [기능 3] 사장님 전용 구인 글 작성 폼 -->
    <section id="formSection" class="bg-amber-50/50 p-6 rounded-2xl border border-amber-200/60 space-y-4">
      <div>
        <h2 class="text-lg font-bold text-amber-900">📢 사장님 구인공고 등록</h2>
        <p class="text-xs text-amber-700 mt-0.5">여기에 등록하면 전국의 구직자가 실시간으로 시트를 통해 조회할 수 있습니다.</p>
      </div>
      
      <form id="jobForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">가게 이름</label>
            <input type="text" id="shopInput" required placeholder="예: 대박치킨" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500 text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">근무 동네</label>
            <input type="text" id="dongInput" required placeholder="예: 역삼동" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">업종 분류</label>
            <select id="categoryInput" class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-orange-500 text-sm">
              <option value="식당/카페">식당/카페</option>
              <option value="편의점/마트">편의점/마트</option>
              <option value="서빙/주방">서빙/주방</option>
              <option value="사무/기타">사무/기타</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">제시 시급 (원)</label>
            <input type="number" id="payInput" required placeholder="예: 10030" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500 text-sm">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">담당 업무 (하는 일)</label>
          <input type="text" id="titleInput" required placeholder="예: 주말 주방 보조 및 마감 설거지" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500 text-sm">
        </div>

        <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-all shadow-sm cursor-pointer">
          공고 사이트에 진짜 등록하기 🚀
        </button>
      </form>
    </section>

  </main>

  <!-- 💡 자바스크립트 엔진 (필터링 & 시트 연동 통합) -->
  <script>
    // ⚠️ 중요: 본인의 Google Apps Script 웹앱 배포 URL을 여기에 넣어주세요!
    const APPS_SCRIPT_URL = "여기에_구글_웹앱_URL을_붙여넣으세요"; 

    let masterJobs = []; // 원본 데이터를 갖고 있을 마스터 배열

    // 1. 시트에서 전체 데이터 긁어오기
    function loadJobs() {
      const loadingText = document.getElementById("loadingText");
      const jobList = document.getElementById("jobList");
      
      loadingText.style.display = "block";
      jobList.style.display = "none";

      if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "여기에_구글_웹앱_URL을_붙여넣으세요") {
        fetch(APPS_SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            masterJobs = data; // 백엔드 시트 데이터 확보
            filterJobs();      // 화면 그리기 및 필터 실행
          })
          .catch(err => {
            console.error("원격 연결 실패:", err);
            loadLocalBackup();
          });
      } else {
        loadLocalBackup();
      }
    }

    // 시트 주소가 없거나 에러 날 때 작동할 로컬 저장소 백업 로직
    function loadLocalBackup() {
      masterJobs = JSON.parse(localStorage.getItem("jobs")) || [];
      filterJobs();
    }

    // 2. [핵심] 일자리 찾기 / 동네 필터링 / 정렬 처리 함수
    function filterJobs() {
      const searchDongValue = document.getElementById("searchDong").value.trim();
      const filterCategoryValue = document.getElementById("filterCategory").value;
      const sortPayValue = document.getElementById("sortPay").value;

      // 1) 필터 적용 (동네 및 업종)
      let filtered = masterJobs.filter(job => {
        const matchesDong = job.dong.includes(searchDongValue);
        const matchesCategory = (filterCategoryValue === "전체") || (job.category === filterCategoryValue);
        return matchesDong && matchesCategory;
      });

      // 2) 정렬 적용
      if (sortPayValue === "highPay") {
        // 시급 높은 순 정렬
        filtered.sort((a, b) => Number(b.pay) - Number(a.pay));
      } else {
        // 기본값: 최신순 정렬 (시트 아래 행이 최신이므로 역순 정렬)
        // 백엔드 연동 상태에 따라 원본 데이터 배열 순서를 감안해 뒤집어 표현
        filtered = [...filtered].reverse(); 
      }

      renderJobList(filtered);
    }

    // 3. 필터링이 완료된 최종 리스트를 화면에 렌더링
    function renderJobList(items) {
      const loadingText = document.getElementById("loadingText");
      const jobList = document.getElementById("jobList");
      const jobCount = document.getElementById("jobCount");
      
      loadingText.style.display = "none";
      jobList.style.display = "grid";
      jobList.innerHTML = "";
      
      jobCount.innerText = items.length;

      if (items.length === 0) {
        jobList.innerHTML = `
          <div class="col-span-full text-center py-16 bg-white text-gray-400 rounded-2xl border border-dashed border-gray-200">
            조건에 맞는 주변 일자리가 없습니다. 🔍 다른 동네를 검색해 보세요!
          </div>`;
        return;
      }

      items.forEach(job => {
        const card = document.createElement("div");
        card.className = "bg-white p-5 rounded-2xl shadow-xs border border-gray-100 flex flex-col justify-between gap-4 hover:shadow-md transition-shadow";
        card.innerHTML = `
          <div>
            <div class="flex gap-2 mb-1.5 items-center">
              <span class="bg-orange-50 text-orange-600 text-xs px-2.5 py-0.5 rounded-md font-bold">${job.category}</span>
              <span class="text-xs text-gray-400 font-medium">📍 ${job.dong}</span>
            </div>
            <h4 class="text-base font-bold text-gray-800 mb-1">${job.title}</h4>
            <p class="text-sm text-gray-500">${job.shop}</p>
          </div>
          <div class="border-t border-gray-50 pt-3 flex justify-between items-center">
            <span class="text-xs text-gray-400">제시 시급</span>
            <span class="text-base font-black text-orange-600">${Number(job.pay).toLocaleString()}원</span>
          </div>
        `;
        jobList.appendChild(card);
      });
    }

    // 4. 사장님 공고 등록 시 시트로 POST 전송
    document.getElementById("jobForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const newJob = {
        shop: document.getElementById("shopInput").value,
        title: document.getElementById("titleInput").value,
        dong: document.getElementById("dongInput").value,
        category: document.getElementById("categoryInput").value,
        pay: document.getElementById("payInput").value
      };

      if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "여기에_구글_웹앱_URL을_붙여넣으세요") {
        const btn = e.target.querySelector("button[type='submit']");
        btn.disabled = true;
        btn.innerText = "구글 시트에 실시간 기록 중... 🔓";

        fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(newJob),
          headers: { "Content-Type": "text/plain" }
        })
        .then(res => res.json())
        .then(result => {
          if (result.status === "success") {
            alert("🎉 성공! 작성하신 구인공고가 전광판에 등록되었습니다.");
            document.getElementById("jobForm").reset();
            loadJobs(); // 실시간 데이터 새로고침
          } else {
            alert("시트 전송 에러: " + result.message);
          }
        })
        .catch(err => {
          console.error(err);
          alert("서버 연결 실패");
        })
        .finally(() => {
          btn.disabled = false;
          btn.innerText = "공고 사이트에 진짜 등록하기 🚀";
        });
      } else {
        // 로컬 테스트용
        masterJobs.push(newJob);
        localStorage.setItem("jobs", JSON.stringify(masterJobs));
        alert("⚠️ 시트 주소가 없어 로컬 브라우저에 임시 기록되었습니다.");
        document.getElementById("jobForm").reset();
        filterJobs();
      }
    });

    // 5. 브라우저 켜지면 최초 1회 실행
    window.onload = loadJobs;
  </script>
</body>
</html>
